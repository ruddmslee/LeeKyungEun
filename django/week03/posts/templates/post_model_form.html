{% extends 'base.html' %} {% block title %}Model Form{% endblock %}

{% block content %}
<h1>Post 입력 화면 - ModelForm 사용</h1>
<form 
    action="{% url 'posts:post-model-form' %}"
    method="POST"
    enctype="multipart/form-data"
>
    {% csrf_token %}
    <div>{{form.as_p}}</div>
    <div>
        <input type="submit">
    </div>
</form>
{% endblock %}
