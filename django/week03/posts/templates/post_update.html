<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 수정 페이지</title>
</head>
<body>
    <h1>게시글 수정</h1>
    <form 
        action="{% url 'posts:post-update' post.id %}"
        method="POST"
        enctype="multipart/form-data"
    >
        {% csrf_token %}
        <div>{{form.as_p}}</div>
        <div>
            <input type="submit">
        </div>
</form>
</body>
</html>
