{% extends 'base.html' %} {% block title %}Login{% endblock %}

{% block content %}
<h1>로그인</h1>
<form 
    action="{% url 'accounts:login' %}"
    method="POST"
    enctype="multipart/form-data"
>
    {% csrf_token %}
    <div>{{form.as_p}}</div>
    <div>
        <input type="submit">
    </div>
</form>
{% endblock %}
